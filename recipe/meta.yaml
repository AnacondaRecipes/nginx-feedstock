{% set name = "nginx" %}
{% set version = "1.29.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://nginx.org/download/{{ name }}-{{ version }}.tar.gz
  sha256: 673f8fb8c0961c44fbd9410d6161831453609b44063d3f2948253fc2b5692139
  patches:
    - pcre-config.patch  # find pcre in PREFIX instead of /usr

build:
  number: 0
  no_link:
    - etc/*
    - var/log/nginx/*
  skip: true  # [win]

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}  # [not osx]
    - make
  host:
    - libgd {{ libgd }}
    - libxslt {{ libxslt }}
    - libxml2 {{ libxml2 }}
    - openssl {{ openssl }}
    - pcre2 {{ pcre2 }}
    - libzlib {{ libzlib }}
  run:
    # They should be pinned through run_exports
    - libgd
    - libxml2
    - libxslt
    - openssl
    - pcre2

test:
  requires:
    - curl

about:
  home: https://nginx.org
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Nginx is an HTTP and reverse proxy server
  description: |
    Nginx can act as a reverse proxy server for TCP, UDP, HTTP, HTTPS, SMTP,
    POP3, IMAP, and gRPC protocols, as well as a load balancer and an HTTP cache.
    Nginx uses an asynchronous event-driven approach to handling requests.
  doc_url: https://nginx.org/en/docs
  dev_url: https://github.com/nginx/nginx

extra:
  recipe-maintainers:
    - sodre
